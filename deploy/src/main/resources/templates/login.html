<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Student Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --cream-bg: #fdfaf3;
            --accent-tan: #c8a27c;
            --warm-text: #4a453e;
            --warm-subtitle: #7d7268;
        }

        body {
            background-color: var(--cream-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        /* --- BAGIAN GAMBAR --- */
        .img-container {
            width: 100%;
            height: 250px; /* Sesuaikan tinggi gambar */
            overflow: hidden;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Agar gambar tidak gepeng */
        }

        .quote-text {
            font-style: italic;
            font-size: 0.9rem;
            color: var(--warm-subtitle);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .header-title {
            font-weight: bold;
            font-size: 1.4rem;
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            text-align: left;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .form-control {
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-bottom: 15px;
        }

        .btn-tan {
            background-color: var(--accent-tan);
            color: white;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="login-box">
    <div class="img-container">
        <img src="/img_1.png" alt="Student Illustration">
    </div>

    <p class="quote-text">
        "Keberhasilan bukanlah akhir, kegagalan bukanlah hal fatal: yang terpenting adalah keberanian untuk terus melangkah."
    </p>

    <h2 class="header-title">Login Page</h2>

    <form th:action="@{/login}" method="post">
        <div class="text-start">
            <label class="form-label">Username:</label>
            <input type="text" name="username" class="form-control" required autofocus>

            <label class="form-label">Password:</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-tan">Login</button>
    </form>
</div>

</body>
</html>
