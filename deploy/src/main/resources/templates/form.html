<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Data | Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream-bg: #fdfaf3;
            --accent-tan: #c8a27c;
            --warm-text: #4a453e;
            --warm-secondary: #7d7268;
        }

        body { 
            background-color: var(--cream-bg); 
            font-family: 'Inter', sans-serif; 
            padding-top: 80px;
            padding-bottom: 80px;
            color: var(--warm-text);
            margin: 0;
        }

        .form-box { 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 50px; 
            background-color: #ffffff;
            border: 1px solid rgba(200, 162, 124, 0.15); 
            border-radius: 24px;
            box-shadow: 0 10px 15px -3px rgba(200, 162, 124, 0.04), 0 4px 6px -2px rgba(200, 162, 124, 0.02);
        }

        .title-text { 
            font-weight: 800; 
            font-size: 1.75rem;
            letter-spacing: -0.04em;
            margin-bottom: 0.5rem;
        }

        .subtitle-text {
            color: var(--warm-secondary);
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
        }

        .form-label { 
            font-weight: 700; 
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--warm-secondary);
            margin-bottom: 0.625rem;
        }

        .form-control {
            padding: 0.75rem 1.125rem;
            border-radius: 12px;
            border: 1px solid #e8e3d9;
            background-color: #fdfcf9;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--accent-tan);
            box-shadow: 0 0 0 4px rgba(200, 162, 124, 0.08);
            background-color: #ffffff;
            outline: none;
        }

        .gender-container {
            padding: 1rem;
            background-color: #fdfcf9;
            border-radius: 14px;
            border: 1px solid #e8e3d9;
        }

        .form-check-label {
            font-size: 0.925rem;
            font-weight: 600;
            cursor: pointer;
        }

        .form-check-input:checked {
            background-color: var(--accent-tan);
            border-color: var(--accent-tan);
        }

        .btn-tan { 
            background-color: var(--accent-tan); 
            color: white; 
            border: none; 
            padding: 14px 30px; 
            font-weight: 700; 
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(200, 162, 124, 0.2);
        }

        .btn-tan:hover { 
            background-color: #b08b65; 
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(200, 162, 124, 0.3);
            color: white;
        }

        .btn-cancel { 
            background-color: #ffffff; 
            color: var(--warm-secondary); 
            border: 1.5px solid #e8e3d9; 
            padding: 14px 30px; 
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-cancel:hover { 
            background-color: #fdfbf7; 
            color: var(--warm-text);
            border-color: var(--accent-tan);
        }
    </style>
</head>
<body>
    <div class="container px-4">
        <div class="form-box">
            <div class="text-center">
                <h1 class="title-text">Input Data</h1>
                <p class="subtitle-text">Lengkapi informasi mahasiswa di bawah ini</p>
            </div>

            <form th:action="@{/save}" th:object="${user}" method="post">
                <div class="mb-4">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" th:field="*{nama}" class="form-control" placeholder="Masukkan nama lengkap" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">NIM (Nomor Induk Mahasiswa)</label>
                    <input type="text" th:field="*{nim}" class="form-control" placeholder="Contoh: 20230140047" required>
                </div>
                
                <div class="mb-5">
                    <label class="form-label d-block">Jenis Kelamin</label>
                    <div class="d-flex gap-5 gender-container">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" th:field="*{jenisKelamin}" value="Laki-laki" id="laki" required>
                            <label class="form-check-label" for="laki">Laki-laki</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" th:field="*{jenisKelamin}" value="Perempuan" id="perempuan">
                            <label class="form-check-label" for="perempuan">Perempuan</label>
                        </div>
                    </div>
                </div>
                
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-tan flex-grow-1">Simpan Data</button>
                    <a href="/home" class="btn btn-cancel text-center">Batal</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
