<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream-bg: #fdfaf3;
            --accent-tan: #c8a27c;
            --table-header: #d4a373;
            --warm-text: #4a453e;
            --warm-secondary: #8a8276;
            --card-border: rgba(200, 162, 124, 0.2);
        }

        body { 
            background-color: var(--cream-bg); 
            font-family: 'Inter', sans-serif; 
            color: var(--warm-text);
            padding-bottom: 80px;
            margin: 0;
        }

        .header-section { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 40px 0; 
        }

        .brand-title { 
            font-size: 1.85rem; 
            font-weight: 800; 
            letter-spacing: -0.04em;
            color: var(--warm-text); 
            margin: 0; 
        }

        /* Logout - Red Outline but warmer */
        .btn-logout {
            color: #b91c1c;
            border: 1.5px solid #fecaca;
            background: #ffffff;
            padding: 8px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .btn-logout:hover { 
            background-color: #fff1f2; 
            border-color: #b91c1c;
            transform: scale(0.98);
        }

        /* Premium Cream Card */
        .main-card {
            background-color: #ffffff;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 4px 6px -1px rgba(200, 162, 124, 0.05), 0 20px 25px -5px rgba(200, 162, 124, 0.03);
            border: 1px solid var(--card-border);
        }

        .welcome-msg { 
            color: var(--warm-secondary); 
            font-weight: 500; 
            margin-bottom: 2.5rem; 
            font-size: 1rem;
        }

        .btn-add {
            background-color: var(--accent-tan);
            color: white;
            padding: 12px 28px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.925rem;
            transition: all 0.3s ease;
            border: none;
            box-shadow: 0 4px 6px -1px rgba(200, 162, 124, 0.2);
        }

        .btn-add:hover { 
            background-color: #b08b65; 
            color: white; 
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(200, 162, 124, 0.3);
        }

        /* Table - Muted Golden Header */
        .table-container {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #f2eee6;
        }

        .table { margin-bottom: 0; }
        .table thead { 
            background-color: var(--table-header); 
            color: white; 
            border-bottom: none;
        }
        
        .table th { 
            font-weight: 700; 
            font-size: 0.825rem; 
            text-transform: uppercase; 
            letter-spacing: 0.08em;
            padding: 1.25rem !important;
        }

        .table td { 
            padding: 1.25rem !important; 
            font-size: 0.95rem;
            color: var(--warm-text);
            border-color: #f2eee6;
        }

        .badge-gender {
            display: inline-flex;
            align-items: center;
            padding: 0.375rem 1rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            background-color: #fcf8f0;
            color: var(--table-header);
            border: 1px solid #faeede;
        }

        .footer { 
            margin-top: 50px; 
            font-size: 0.85rem; 
            color: var(--warm-secondary); 
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container px-4">
        <!-- Header -->
        <header class="header-section">
            <h1 class="brand-title">MY Website 20230140047</h1>
            <a href="/logout" class="btn-logout">Logout</a>
        </header>
        
        <!-- Main Card -->
        <main class="main-card">
            <p class="welcome-msg">Selamat datang di aplikasi dashboard mahasiswa!</p>
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold fs-4 m-0">Data Mahasiswa</h2>
                <a href="/form" class="btn-add">
                    + New Student
                </a>
            </div>
            
            <div class="table-container">
                <table class="table text-center align-middle">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama Lengkap</th>
                            <th>NIM</th>
                            <th>Jenis Kelamin</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="mhs, stat : ${listMahasiswa}">
                            <td class="fw-bold text-muted small" th:text="${stat.count}"></td>
                            <td class="fw-semibold" th:text="${mhs.nama}"></td>
                            <td class="font-monospace small" th:text="${mhs.nim}"></td>
                            <td>
                                <span class="badge-gender" th:text="${mhs.jenisKelamin}"></span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(listMahasiswa)}">
                            <td colspan="4" class="py-5 text-muted italic">
                                Belum ada data tersedia saat ini.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>

        <footer class="text-center footer">
            NIM: 20230140047 | Student Portal
        </footer>
    </div>
</body>
</html>
